<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Communication Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d12;
    --surface:  #16151f;
    --card:     #1e1c2a;
    --border:   #2e2b40;
    --magenta:  #e040fb;
    --violet:   #c084fc;
    --pink:     #f472b6;
    --muted:    #7c6fa0;
    --text:     #e8d5ff;
    --dim:      #a08cc0;
    --red:      #ff6b8a;
    --amber:    #f59e0b;
    --blue:     #60a5fa;
    --green:    #34d399;
    --teal:     #00e5cc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 10% 0%, rgba(192,132,252,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 100%, rgba(224,64,251,0.05) 0%, transparent 60%);
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: rgba(22,21,31,0.7);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .hicon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--magenta), var(--violet));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 21px; color: var(--violet); }
  header .sub { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }

  .tabs { display: flex; padding: 0 32px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 14px 22px; font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab:hover { color: var(--violet); }
  .tab.active { color: var(--magenta); border-bottom-color: var(--magenta); }

  .panel { display: none; padding: 32px; max-width: 840px; margin: 0 auto; }
  .panel.active { display: block; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .fg { display: flex; flex-direction: column; gap: 7px; }
  .fg.full { grid-column: 1/-1; }

  label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }

  input, select, textarea {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 14px; outline: none; width: 100%; transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(192,132,252,.12); }
  select option { background: #1e1c2a; }
  textarea { resize: vertical; min-height: 90px; }

  .btn {
    background: linear-gradient(135deg, var(--magenta), var(--violet));
    color: #fff; border: none; border-radius: 8px; padding: 12px 28px;
    font-family: 'DM Mono', monospace; font-size: 12px; text-transform: uppercase;
    letter-spacing: .1em; cursor: pointer; transition: opacity .2s, transform .15s;
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .btn-row { grid-column: 1/-1; display: flex; align-items: center; gap: 16px; margin-top: 6px; }
  #saveStatus { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* Parent card */
  .pcard { grid-column: 1/-1; background: var(--card); border: 1px solid rgba(192,132,252,.25); border-radius: 10px; padding: 16px; display: none; }
  .pcard.show { display: block; }
  .pcard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .pcard-title { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--magenta); }
  .pcontacts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .cblock {
    background: rgba(192,132,252,.06); border: 2px solid rgba(192,132,252,.12);
    border-radius: 8px; padding: 13px 15px; cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .cblock:hover { border-color: rgba(192,132,252,.35); background: rgba(192,132,252,.1); }
  .cblock.selected { border-color: var(--magenta); background: rgba(224,64,251,.12); }
  .crole { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--violet); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
  .ccheck { display: inline-block; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--muted); flex-shrink: 0; }
  .cblock.selected .ccheck { background: var(--magenta); border-color: var(--magenta); }
  .cname { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .cline { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .ci { color: var(--muted); font-size: 11px; width: 14px; flex-shrink: 0; }
  a.clink { color: var(--violet); text-decoration: none; }
  a.clink:hover { color: var(--magenta); text-decoration: underline; }
  .pcard-hint { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); font-style: italic; }

  /* Upcoming */
  #loadingMsg { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); text-align: center; padding: 48px; }
  .stats { display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; }
  .stat .n { font-size: 24px; font-weight: 500; }
  .stat .l { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-top: 2px; }

  .sec-hdr { display: flex; align-items: center; gap: 9px; margin: 28px 0 12px; }
  .sec-hdr:first-child { margin-top: 0; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sdot.r { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .sdot.a { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .sec-lbl { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }

  .srow { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px; }
  .srow.ov { border-left: 3px solid var(--red) !important; }
  .srow.ds { border-left: 3px solid var(--amber) !important; }
  .srow.ok { border-left: 3px solid var(--teal) !important; }
  .sd.ok .val { color: var(--teal); }
  .sdot.g { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
  .bg { background: rgba(0,229,204,.1); color: var(--teal); border: 1px solid rgba(0,229,204,.3); }
  .srow.bl { border-left: 3px solid var(--blue) !important; }
  .sl { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .sd { font-family: 'DM Mono', monospace; font-size: 11px; text-align: right; }
  .sd .sl2 { color: var(--muted); font-size: 10px; display: block; margin-bottom: 2px; }
  .sd.ov .val { color: var(--red); }
  .sd.ds .val { color: var(--amber); }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .br { background: rgba(255,107,138,.1); color: var(--red); border: 1px solid rgba(255,107,138,.2); }
  .ba { background: rgba(245,158,11,.1); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
  .sdot.b { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .sd.bl .val { color: var(--blue); }
  .bb { background: rgba(96,165,250,.1); color: var(--blue); border: 1px solid rgba(96,165,250,.2); }

  /* Refresh button */
  .refresh-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: .08em; padding: 7px 14px;
    cursor: pointer; transition: all .2s; margin-left: auto;
  }
  .refresh-btn:hover { border-color: var(--violet); color: var(--violet); }
  .refresh-btn.spinning { opacity: .5; pointer-events: none; }

  /* History modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 560px; max-height: 80vh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .modal-hdr {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--violet); }
  .modal-close {
    background: none; border: none; color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color .2s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; overflow-y: auto; }
  .modal-loading { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: center; padding: 32px; }
  .hentry {
    padding: 12px 0; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 80px 1fr auto; gap: 12px; align-items: start;
  }
  .hentry:last-child { border-bottom: none; }
  .hdate { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--violet); padding-top: 2px; }
  .hmethod { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: rgba(192,132,252,.1); border-radius: 4px; padding: 2px 7px; white-space: nowrap; align-self: start; }
  .hnotes { font-size: 13px; color: var(--dim); line-height: 1.5; }

  /* Fix mobile parent cards */
  @media (max-width: 500px) {
    .pcontacts { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .fg.full { grid-column: 1; }
    .btn-row { grid-column: 1; }
    .pcard { grid-column: 1; }
  }

  .srow.ov.pending, .srow.ds.pending, .srow.bl.pending { border-left-color: var(--amber) !important; }
  .pending-flag { font-size: 11px; background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); border-radius: 4px; padding: 2px 7px; font-family: 'DM Mono', monospace; margin-left: 6px; vertical-align: middle; }
  .sn-btn {
    background: none; border: none; color: var(--text); font-size: 14px; font-weight: 500;
    cursor: pointer; padding: 0; text-align: left; text-decoration: underline;
    text-decoration-color: rgba(192,132,252,.3); text-underline-offset: 3px;
    transition: color .2s;
  }
  .sn-btn:hover { color: var(--violet); }</style>
</head>
<body>

<header>
  <div class="hicon">📋</div>
  <h1>Parent Communication Tracker</h1>
  <span class="sub">2025–2026</span>
  <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">↻ Refresh</button>
</header>

<!-- History Modal -->
<div class="modal-overlay" id="historyModal" onclick="closeHistory(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="historyTitle">Contact History</div>
      <button class="modal-close" onclick="document.getElementById('historyModal').classList.remove('show')">✕</button>
    </div>
    <div class="modal-body" id="historyBody">
      <div class="modal-loading">Loading...</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('log',this)">Log Contact</button>
  <button class="tab" onclick="showTab('upcoming',this)">Upcoming Contacts</button>
</div>

<!-- LOG -->
<div class="panel active" id="tab-log">


  <div class="form-grid">

    <div class="fg">
      <label>Student</label>
      <select id="studentSel" onchange="onStudent()">
        <option value="">— Loading students… —</option>
      </select>
    </div>

    <div class="fg">
      <label>Method</label>
      <select id="methodSel">
        <option value="">— Select method —</option>
        <option value="Phone">Phone Call</option>
        <option value="Email">Email</option>
        <option value="Voicemail">Voicemail Left</option>
        <option value="PPT Email">PPT Email</option>
        <option value="PPT">PPT Meeting</option>
        <option value="No Response">No Response</option>
        <option value="Parent Reached Out">Parent Reached Out — Pending Reply</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <!-- Parent contact card with "who did you speak with" selector -->
    <div class="pcard" id="pcard">
      <div class="pcard-header">
        <div class="pcard-title">📞 Parent Contact Info — Click to select who you spoke with</div>
      </div>
      <div class="pcontacts" id="pcontacts"></div>
      <div id="pcardHint" class="pcard-hint">No parent selected yet — click a card above</div>
    </div>

    <div class="fg">
      <label>Log Date</label>
      <input type="date" id="logDate" onchange="onLogDateChange()">
    </div>

    <div class="fg">
      <label>Next Contact Date</label>
      <input type="date" id="nextDate">
    </div>

    <div class="fg full">
      <label>Notes</label>
      <textarea id="notes" placeholder="What was discussed, outcome, follow-up needed..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn" id="saveBtn" onclick="save()">Save Log Entry</button>
      <span id="saveStatus"></span>
    </div>
  </div>
</div>

<!-- UPCOMING -->
<div class="panel" id="tab-upcoming">
  <div id="loadingMsg">Loading contact schedule...</div>
  <div id="upcomingContent" style="display:none">
    <div class="stats" id="stats"></div>
    <div id="thisWeekEl"></div>
    <div id="nextWeekEl"></div>
    <div id="thisMonthEl"></div>
    <div id="overdueEl"></div>
  </div>
</div>

<script>
const BASE = "appPNhRI7R0xz8qK4";
const LOGS = "tbldeMlVafN0DaUu9";
const F = {
  name:   "Student Name",
  date:   "Log Date",
  method: "Method",
  notes:  "Notes",
  next:   "Next Contact"
};

// ── API Key ─────────────────────────────────────────────────────────────────
const AT_KEY = "patqtQWRdxdEKq7aH.8488354850e883e35084b175e01f16479255753a001043669d85e6d45c4d5d7a";
function getKey() { return AT_KEY; }
function updateKeyUI() {}

// PARENTS is populated dynamically from Airtable Students table
const PARENTS = {};

async function loadStudents() {
  const sel = document.getElementById('studentSel');
  try {
    let records = [], offset = null;
    do {
      const url = new URL(`https://api.airtable.com/v0/${BASE}/Students`);
      url.searchParams.set('pageSize', '100');
      if (offset) url.searchParams.set('offset', offset);
      const res = await fetch(url.toString(), { headers: { 'Authorization': 'Bearer ' + AT_KEY } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      records = records.concat(data.records || []);
      offset = data.offset || null;
    } while (offset);

    records.sort((a, b) => (a.fields['Name']||'').localeCompare(b.fields['Name']||''));

    // Build PARENTS dynamically from Airtable fields
    Object.keys(PARENTS).forEach(k => delete PARENTS[k]);
    sel.innerHTML = '<option value="">— Select student —</option>';
    for (const r of records) {
      const name = r.fields['Name'];
      if (!name) continue;
      const f = r.fields;
      PARENTS[name] = {
        mom: (f['Mom Name'] || f['Mom Email'] || f['Mom Phone']) ? { name: f['Mom Name']||'', email: f['Mom Email']||'', phone: f['Mom Phone']||'' } : null,
        dad: (f['Dad Name'] || f['Dad Email'] || f['Dad Phone']) ? { name: f['Dad Name']||'', email: f['Dad Email']||'', phone: f['Dad Phone']||'' } : null,
      };
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    }
  } catch(e) {
    sel.innerHTML = '<option value="">— Error loading students —</option>';
    console.error('loadStudents error:', e);
  }
}

let selectedContacts = new Set(); // can contain 'mom', 'dad'

// Set default dates
const today = new Date().toISOString().split('T')[0];
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('logDate').value = today;
  const n = new Date(); n.setDate(n.getDate()+14);
  document.getElementById('nextDate').value = n.toISOString().split('T')[0];
  updateKeyUI();
  await loadStudents();
  loadUpcoming();
});

function onLogDateChange() {
  const logDate = document.getElementById('logDate').value;
  if (!logDate) return;
  const d = new Date(logDate + 'T00:00:00');
  d.setDate(d.getDate() + 14);
  document.getElementById('nextDate').value = d.toISOString().split('T')[0];
}


function showTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id === 'upcoming') loadUpcoming();
}

function selectContact(role) {
  if (selectedContacts.has(role)) {
    selectedContacts.delete(role);
  } else {
    selectedContacts.add(role);
  }
  document.querySelectorAll('.cblock').forEach(b => {
    b.classList.toggle('selected', selectedContacts.has(b.dataset.role));
  });
  const p = PARENTS[document.getElementById('studentSel').value];
  if (!p) return;
  if (selectedContacts.size === 0) {
    document.getElementById('pcardHint').textContent = 'Click a contact card above to log who you spoke with';
    document.getElementById('pcardHint').style.color = 'var(--muted)';
  } else {
    const names = [...selectedContacts].map(r => (r === 'mom' ? p.mom : p.dad)?.name || r).join(' & ');
    document.getElementById('pcardHint').textContent = `✓ Logging contact with: ${names}`;
    document.getElementById('pcardHint').style.color = 'var(--violet)';
  }
}

function onStudent() {
  const s = document.getElementById('studentSel').value;
  const card = document.getElementById('pcard');
  const contacts = document.getElementById('pcontacts');
  selectedContacts = new Set();
  document.getElementById('pcardHint').textContent = 'Click a contact card above to log who you spoke with';
  document.getElementById('pcardHint').style.color = 'var(--muted)';

  if (!s || !PARENTS[s]) { card.classList.remove('show'); return; }

  const p = PARENTS[s];
  function block(role, info) {
    if (!info || !info.name) return '';
    return `<div class="cblock" data-role="${role}" onclick="selectContact('${role}')">
      <div class="crole"><span class="ccheck"></span>${role === 'mom' ? 'Mother' : 'Father'}</div>
      <div class="cname">${info.name}</div>
      ${info.email ? `<div class="cline"><span class="ci">✉</span><span>${info.email}</span></div>` : ''}
      ${info.phone ? `<div class="cline"><span class="ci">☎</span><span>${info.phone}</span></div>` : ''}
    </div>`;
  }
  const html = block('mom', p.mom) + block('dad', p.dad);
  if (html) { contacts.innerHTML = html; card.classList.add('show'); }
  else card.classList.remove('show');
}

// ── Save log entry ──────────────────────────────────────────────────────────
async function save() {
  const student  = document.getElementById('studentSel').value;
  const method   = document.getElementById('methodSel').value;
  const logDate  = document.getElementById('logDate').value;
  const nextDate = document.getElementById('nextDate').value;
  const notes    = document.getElementById('notes').value;

  if (!student) { alert('Select a student.'); return; }
  if (!method)  { alert('Select a method.'); return; }

  const key = getKey();
  if (!key) { alert('Please enter your Airtable API key at the top of the page.'); return; }

  const notesWithContact = notes;

  const btn = document.getElementById('saveBtn');
  const st  = document.getElementById('saveStatus');
  btn.disabled = true; st.textContent = 'Saving...'; st.style.color = 'var(--muted)';

  try {
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/${LOGS}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+key },
      body: JSON.stringify({ records: [{ fields: {
        [F.name]:   student,
        [F.date]:   logDate,
        [F.method]: [method],
        [F.notes]:  notesWithContact,
        [F.next]:   nextDate
      }}]})
    });
    if (res.ok) {
      st.textContent = '✓ Saved!'; st.style.color = 'var(--green)';
      document.getElementById('notes').value = '';
      selectedContacts = new Set();
      document.querySelectorAll('.cblock').forEach(b=>b.classList.remove('selected'));
      document.getElementById('pcardHint').textContent = 'Click a contact card above to log who you spoke with';
      document.getElementById('pcardHint').style.color = 'var(--muted)';
      setTimeout(()=>{ st.textContent=''; }, 3000);
    } else {
      const e = await res.json();
      st.textContent = '✗ ' + (e.error?.message || 'Error'); st.style.color = 'var(--red)';
    }
  } catch(e) {
    st.textContent = '✗ Network error'; st.style.color = 'var(--red)';
  }
  btn.disabled = false;
}

// ── Refresh ─────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.textContent = '↻ Refreshing...';
  await loadStudents();
  await loadUpcoming();
  btn.classList.remove('spinning');
  btn.textContent = '↻ Refresh';
}

// ── History modal ────────────────────────────────────────────────────────────
async function openHistory(studentName) {
  const modal = document.getElementById('historyModal');
  const body  = document.getElementById('historyBody');
  const title = document.getElementById('historyTitle');
  title.textContent = studentName;
  body.innerHTML = '<div class="modal-loading">Loading history...</div>';
  modal.classList.add('show');

  try {
    let allRecords = [], offset = null;
    do {
      const url = new URL(`https://api.airtable.com/v0/${BASE}/${LOGS}`);
      url.searchParams.set('filterByFormula', `{${F.name}} = '${studentName.replace(/'/g, "\\'")}'`);
      url.searchParams.append('sort[0][field]', F.date);
      url.searchParams.append('sort[0][direction]', 'desc');
      url.searchParams.set('pageSize', '100');
      if (offset) url.searchParams.set('offset', offset);
      const res  = await fetch(url.toString(), { headers: { 'Authorization': 'Bearer ' + AT_KEY }});
      const data = await res.json();
      allRecords = allRecords.concat(data.records || []);
      offset = data.offset || null;
    } while (offset);

    if (!allRecords.length) {
      body.innerHTML = '<div class="modal-loading">No contact history found.</div>';
      return;
    }

    body.innerHTML = allRecords.map(r => {
      const f      = r.fields;
      const rawDate = f[F.date];
      const method = Array.isArray(f[F.method]) ? f[F.method].join(', ') : (f[F.method] || '—');
      const notes  = f[F.notes] || '';
      // If notes contain embedded date patterns (e.g. "1/3" or "1/27"), it's a bulk historical entry — show month/year only
      const hasBulkDates = /\b\d{1,2}\/\d{1,2}\b/.test(notes);
      const date = rawDate
        ? hasBulkDates
          ? new Date(rawDate+'T00:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'})
          : new Date(rawDate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
        : '—';
      return `<div class="hentry">
        <div class="hdate">${date}</div>
        <div class="hnotes">${notes || '<span style="opacity:.4">No notes</span>'}</div>
        <div class="hmethod">${method}</div>
      </div>`;
    }).join('');
  } catch(e) {
    body.innerHTML = `<div class="modal-loading">Error loading history.</div>`;
  }
}

function closeHistory(e) {
  if (e.target === document.getElementById('historyModal'))
    document.getElementById('historyModal').classList.remove('show');
}

async function loadUpcoming() {
  const key = getKey();
  if (!key) {
    document.getElementById('loadingMsg').textContent = 'Enter your API key in the Log Contact tab to load data.';
    return;
  }

  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('loadingMsg').textContent = 'Loading contact schedule...';
  document.getElementById('upcomingContent').style.display = 'none';

  try {
    // Fetch all records (paginate if needed)
    let allRecords = [];
    let offset = null;
    do {
      const url = new URL(`https://api.airtable.com/v0/${BASE}/${LOGS}`);
      url.searchParams.set('fields[]', F.name);
      url.searchParams.append('fields[]', F.date);
      url.searchParams.append('fields[]', F.next);
      url.searchParams.append('fields[]', F.method);
      url.searchParams.append('sort[0][field]', F.date);
      url.searchParams.append('sort[0][direction]', 'desc');
      url.searchParams.set('pageSize', '100');
      if (offset) url.searchParams.set('offset', offset);

      const res = await fetch(url.toString(), { headers: { 'Authorization': 'Bearer '+key }});
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      allRecords = allRecords.concat(data.records || []);
      offset = data.offset || null;
    } while (offset);

    // Most recent log per student
    const latest = {};
    for (const r of allRecords) {
      const f = r.fields;
      // Student name field: could be plain text string or array (linked record)
      let nm = f[F.name];
      if (Array.isArray(nm)) nm = nm[0]; // linked record returns array of IDs — use text instead
      // If it's an object (linked record with name), extract the name
      if (nm && typeof nm === 'object') nm = nm.name || nm.text || JSON.stringify(nm);
      if (!nm || typeof nm !== 'string') continue;
      nm = nm.trim();

      const logDate = f[F.date] || null;
      const next    = f[F.next] || null;
      const method  = Array.isArray(f[F.method]) ? f[F.method][0] : (f[F.method] || null);
      // Use the entry with the most recent Log Date — that's the "current" state
      if (!latest[nm] || (logDate||'') > (latest[nm].logDate||''))
        latest[nm] = { logDate, next, method };
    }

    // Use the live student list from the dropdown (pulled from Airtable)
    const studentNames = [...document.getElementById('studentSel').options]
      .map(o => o.value).filter(Boolean);

    // Helper: skip weekends when bumping next contact date
    function nextWeekday(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr+'T00:00:00');
      if (d.getDay() === 6) d.setDate(d.getDate()+2); // Sat → Mon
      if (d.getDay() === 0) d.setDate(d.getDate()+1); // Sun → Mon
      return d.toISOString().split('T')[0];
    }

    const tod = new Date(); tod.setHours(0,0,0,0);
    const in7  = new Date(tod); in7.setDate(in7.getDate()+7);
    const in14 = new Date(tod); in14.setDate(in14.getDate()+14);
    const twoWeeksAgo = new Date(tod); twoWeeksAgo.setDate(twoWeeksAgo.getDate()-14);
    const thisWeek=[], nextWeek=[], thisMonth=[], overdue=[];

    for (const nm of studentNames) {
      const info = latest[nm];
      // No log at all — straight to bottom
      if (!info?.next) { overdue.push({nm, logDate:info?.logDate||null, next:null, method:info?.method||null, hardOverdue:true}); continue; }

      const nextAdj = nextWeekday(info.next); // bump weekends to Monday
      const nd = new Date(nextAdj+'T00:00:00');
      const daysOverdue = Math.round((tod - nd) / 86400000);

      if (daysOverdue > 14) {
        // More than 2 weeks overdue — kick to bottom list
        overdue.push({nm, ...info, next: nextAdj, hardOverdue: false, daysOverdue});
      } else if (nd <= in7) {
        thisWeek.push({nm, ...info, next: nextAdj, daysOverdue: daysOverdue > 0 ? daysOverdue : 0});
      } else if (nd <= in14) {
        nextWeek.push({nm, ...info, next: nextAdj, daysOverdue: 0});
      } else {
        thisMonth.push({nm, ...info, next: nextAdj, daysOverdue: 0});
      }
    }

    // Sort: overdue within group floats to top, then by date
    const byDateUrgent = (a,b) => {
      if (a.daysOverdue > 0 && b.daysOverdue === 0) return -1;
      if (a.daysOverdue === 0 && b.daysOverdue > 0) return 1;
      if (!a.next && !b.next) return a.nm.localeCompare(b.nm);
      if (!a.next) return 1;
      if (!b.next) return -1;
      return a.next.localeCompare(b.next);
    };
    const byDate = (a,b) => {
      if (!a.next && !b.next) return a.nm.localeCompare(b.nm);
      if (!a.next) return -1; // no log floats to top of overdue
      if (!b.next) return 1;
      return b.next.localeCompare(a.next); // most recently overdue first
    };
    thisWeek.sort(byDateUrgent);
    nextWeek.sort(byDateUrgent);
    thisMonth.sort((a,b) => a.next.localeCompare(b.next));
    overdue.sort(byDate);

    document.getElementById('loadingMsg').style.display='none';
    document.getElementById('upcomingContent').style.display='block';

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="n" style="color:var(--red)">${thisWeek.length}</div><div class="l">Due This Week</div></div>
      <div class="stat"><div class="n" style="color:var(--teal)">${nextWeek.length}</div><div class="l">Due Next Week</div></div>
      <div class="stat"><div class="n" style="color:var(--blue)">${thisMonth.length}</div><div class="l">Due This Month</div></div>
      <div class="stat"><div class="n" style="color:var(--muted)">${overdue.length}</div><div class="l">Overdue</div></div>
      <div class="stat"><div class="n" style="color:var(--violet)">${studentNames.length}</div><div class="l">Students</div></div>`;

    function fmt(d) {
      if (!d) return 'Never';
      return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'});
    }
    function fmtNext(d) {
      if (!d) return '—';
      const dt = new Date(d+'T00:00:00');
      const day  = dt.toLocaleDateString('en-US',{weekday:'short'});
      const date = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return `${day}, ${date}`;
    }
    function diffLabel(daysOverdue, next, showCountdown) {
      if (!next) return 'No log';
      if (daysOverdue > 0) return `${daysOverdue}d overdue`;
      if (!showCountdown) return '';
      const x = Math.round((new Date(next+'T00:00:00') - tod) / 86400000);
      if (x === 0) return 'Due today';
      return `in ${x}d`;
    }

    function render(el, items, rowCls, dateCls, badgeCls, dotCls, lbl, showCountdown) {
      if (!items.length) { el.innerHTML=''; return; }
      el.innerHTML = `
        <div class="sec-hdr"><div class="sdot ${dotCls}"></div><span class="sec-lbl">${lbl} (${items.length})</span></div>
        ${items.map(s => {
          const isOverdueInGroup = s.daysOverdue > 0;
          const rowClass  = isOverdueInGroup ? 'ov' : rowCls;
          const dateClass = isOverdueInGroup ? 'ov' : dateCls;
          const badgeClass= isOverdueInGroup ? 'br' : badgeCls;
          const countdown = diffLabel(s.daysOverdue, s.next, showCountdown);
          // For hard overdue (bottom list): show last contact date, not next contact
          const isHardOverdue = s.hardOverdue !== undefined;
          const dateLabel = (isHardOverdue && s.next) ? 'Last contacted' : (s.next ? 'Next contact' : 'Last contacted');
          const dateVal   = (isHardOverdue && s.next) ? fmtNext(s.next) : (s.next ? fmtNext(s.next) : fmt(s.logDate));
          return `<div class="srow ${rowClass}${s.method === 'Parent Reached Out' ? ' pending' : ''}">
            <div><button class="sn-btn" onclick="openHistory('${s.nm.replace(/'/g,"\\'")}')">  ${s.nm}</button>${s.method === 'Parent Reached Out' ? '<span class="pending-flag">⚠ Reply Needed</span>' : ''}<div class="sl">Last: ${fmt(s.logDate)}</div></div>
            <div class="sd ${dateClass}"><span class="sl2">${dateLabel}</span><span class="val">${dateVal}</span></div>
            ${countdown ? `<div class="badge ${badgeClass}">${countdown}</div>` : '<div></div>'}
          </div>`;
        }).join('')}
        <div class="divider"></div>`;
    }

    render(document.getElementById('thisWeekEl'),  thisWeek,  'ds','ds','ba','a','Due This Week',           true);
    render(document.getElementById('nextWeekEl'),  nextWeek,  'ok','ok','bg','g','Due Next Week',           true);
    render(document.getElementById('thisMonthEl'), thisMonth, 'bl','bl','bb','b','Due This Month & Beyond', false);
    render(document.getElementById('overdueEl'),   overdue,   'ov','ov','br','r','Overdue / No Log',        false);

  } catch(e) {
    document.getElementById('loadingMsg').style.display='block';
    document.getElementById('loadingMsg').textContent = 'Error loading data: ' + e.message;
  }
}
</script>
